version: "3.8"
services:
  linuxlab:
    build: .
    container_name: linuxlab
    hostname: docker-linux-lab
    tty: true
    stdin_open: true
    volumes:
      - ${PWD}/myconfig.txt:/root/myconfig.txt
    networks:
      labnet:
        ipv4_address: 172.28.0.10

networks:
  labnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16